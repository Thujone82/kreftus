<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="description" content="Weather forecast app using National Weather Service API with optional AirNow AQI support using your own API key.">
    <meta name="theme-color" content="#008B8B">
    <title>Forecast</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css?v=1.8.1">
    <link rel="icon" type="image/png" href="icons/light-icon-192.png">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>
                <img id="headerIcon" src="icons/light-icon-192.png" alt="Forecast Icon" class="header-icon" title="Double-click for settings" role="button" aria-label="Double-click to open settings">
                <span class="forecast-text">Forecast</span>
            </h1>
        </div>
        <div class="header-right">
            <input type="text" id="locationInput" placeholder="Zip Code or City, State" autocomplete="off" aria-label="Location: zip code or city, state">
            <button id="searchBtn" class="btn btn-primary" aria-label="Load weather for entered location">Load</button>
        </div>
    </header>

    <main>

        <!-- Mode Selector Buttons -->
        <section class="mode-selector">
            <button id="fullModeBtn" class="mode-btn active" data-mode="full">Full</button>
            <button id="dailyModeBtn" class="mode-btn" data-mode="daily">Daily</button>
            <button id="hourlyModeBtn" class="mode-btn" data-mode="hourly">Hourly</button>
            <button id="rainModeBtn" class="mode-btn" data-mode="rain">Rain</button>
            <button id="windModeBtn" class="mode-btn" data-mode="wind">Wind</button>
            <button id="historyModeBtn" class="mode-btn" data-mode="history">History</button>
        </section>

        <!-- Control Bar -->
        <section class="control-bar">
            <button id="favoriteBtn" class="btn btn-secondary favorite-btn" title="Select to save location" aria-label="Select to save location">⭐️</button>
            <button id="currentLocationBtn" class="btn btn-secondary current-location-btn" title="Load this location" aria-label="Load this location">📍</button>
            <button id="locationsBtn" class="btn btn-secondary locations-btn" title="Click to open/close locations bar" aria-label="Open or close locations bar">🌎Locations ▾</button>
            <button id="refreshBtn" class="btn btn-secondary" title="Click to update data" aria-label="Update weather data">Refresh</button>
            <span id="updateIndicatorContainer" class="toggle-label"></span>
            <span id="lastUpdate" class="last-update"></span>
        </section>

        <!-- Locations Drawer -->
        <section id="locationsDrawer" class="locations-drawer hidden">
            <div id="locationButtons" class="location-buttons"></div>
        </section>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading-indicator hidden">
            <div class="spinner"></div>
            <span>Loading weather data...</span>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Main Content Area -->
        <div id="weatherContent" class="weather-content"></div>

        <!-- Update Notification -->
        <div id="updateNotification" class="update-notification hidden">
            <span>New version available!</span>
            <button id="reloadBtn" class="btn btn-primary" aria-label="Reload page to get new version">Reload</button>
        </div>
    </main>

    <!-- Config Modal -->
    <div id="configModal" class="config-modal hidden" role="dialog" aria-modal="true" aria-labelledby="configModalTitle">
        <div class="config-modal-overlay"></div>
        <div class="config-modal-content">
            <h2 id="configModalTitle" class="config-modal-title">Settings</h2>
            <div class="config-option">
                <label for="primaryAccentColor">Primary Accent Color</label>
                <input type="color" id="primaryAccentColor" value="#00ff00">
            </div>
            <div class="config-option">
                <label for="secondaryAccentColor">Secondary Accent Color</label>
                <input type="color" id="secondaryAccentColor" value="#00ced1">
            </div>
            <button type="button" id="configModalResetColors" class="btn btn-secondary config-reset-colors-btn" aria-label="Reset accent colors to default">Reset Colors</button>
            <div class="config-option config-toggle-row">
                <span class="config-toggle-label">Standard</span>
                <label class="config-toggle-pill">
                    <input type="checkbox" id="unitsMetricCheckbox" aria-label="Use metric units">
                    <span class="config-toggle-slider"></span>
                </label>
                <span class="config-toggle-label">Metric</span>
            </div>
            <div class="config-option config-toggle-row">
                <span class="config-toggle-label">AM/PM</span>
                <label class="config-toggle-pill">
                    <input type="checkbox" id="time24Checkbox" aria-label="Use 24-hour time">
                    <span class="config-toggle-slider"></span>
                </label>
                <span class="config-toggle-label">24H</span>
            </div>
            <div class="config-option config-toggle-row">
                <span class="config-toggle-label">Compact</span>
                <label class="config-toggle-pill">
                    <input type="checkbox" id="uiDensityNormalCheckbox" aria-label="Use normal UI density">
                    <span class="config-toggle-slider"></span>
                </label>
                <span class="config-toggle-label">Normal</span>
            </div>
            <div class="config-option">
                <label class="config-checkbox-label">
                    <input type="checkbox" id="autoUpdateToggle" checked aria-label="Automatically update weather data">
                    <span>Auto-Update Data</span>
                </label>
            </div>
            <div id="updateAllToggleContainer" class="config-option config-toggle-row hidden">
                <span class="config-toggle-label">Displayed</span>
                <label class="config-toggle-pill">
                    <input type="checkbox" id="updateAllToggle" aria-label="Update all saved locations in background when stale">
                    <span class="config-toggle-slider"></span>
                </label>
                <span class="config-toggle-label">All</span>
            </div>
            <div class="config-option config-extras">
                <span class="config-option-label">Extras</span>
                <label class="config-checkbox-label">
                    <input type="checkbox" id="enableAqiToggle" aria-label="Enable AQI data from AirNow">
                    <span>Enable AQI</span>
                </label>
                <div id="aqiApiKeyContainer" class="config-option hidden">
                    <label for="aqiApiKeyInput">AirNow API Key:</label>
                    <div class="api-key-inline-row">
                        <input type="password" id="aqiApiKeyInput" class="config-api-key-input" aria-label="AirNow API Key">
                        <span id="aqiApiKeyStatus" class="api-key-status" aria-live="polite"></span>
                    </div>
                    <div id="aqiApiKeyHelpBlock" class="aqi-api-key-help-block">
                        <small class="config-api-key-help">
                            <a href="https://docs.airnowapi.org/account/request/" target="_blank" rel="noopener noreferrer">Request an AirNow API Key</a>
                        </small>
                        <small class="config-api-key-help">AQI is optional and disabled by default. Your key is stored locally in this browser.</small>
                    </div>
                    <small id="aqiApiKeyDebug" class="config-api-key-debug hidden" aria-live="polite"></small>
                </div>
                <label class="config-checkbox-label">
                    <input type="checkbox" id="irradianceCheckbox" aria-label="Enable solar irradiance in conditions">
                    <span>Enable Solar Irradiance</span>
                </label>
                <label class="config-checkbox-label">
                    <input type="checkbox" id="perLocationColorsCheckbox" aria-label="Enable per location colors">
                    <span>Enable per Location Colors</span>
                </label>
            </div>
            <button id="configModalClose" class="btn btn-primary" aria-label="Close settings">Done</button>
            <button id="installBtn" class="btn btn-secondary hidden" title="Install Forecast app" aria-label="Install Forecast app">Install Forecast</button>
            <button id="configModalReset" class="btn btn-secondary config-reset-btn" aria-label="Reset Forecast: clear all saved locations and data">Reset Forecast</button>
            <p id="configModalVersion" class="config-version-note" aria-live="polite"></p>
            <p id="configModalIosInstallHint" class="config-ios-install-hint hidden" aria-live="polite"></p>
        </div>
    </div>

    <script src="js/utils.js?v=1.8.1"></script>
    <script src="js/api.js?v=1.8.1"></script>
    <script src="js/weather.js?v=1.8.1"></script>
    <script src="js/display.js?v=1.8.1"></script>
    <script src="js/app.js?v=1.8.1"></script>
</body>
</html>
