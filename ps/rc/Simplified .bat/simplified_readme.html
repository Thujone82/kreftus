<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r.bat — Simplified rc Edition Documentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css" crossorigin="anonymous">
    <style>
        html { color-scheme: light; }
        body { background: #f4f4f4; color: #333; margin: 0; }
        .doc-nav {
            max-width: 920px; margin: 0 auto; padding: 1rem 1.5rem 0;
            font-family: system-ui, sans-serif; font-size: 0.95rem; color: #555;
        }
        .doc-nav a { color: #0066cc; }
        .markdown-body {
            box-sizing: border-box; min-width: 200px; max-width: 920px;
            margin: 0 auto; padding: 1rem 1.5rem 2rem;
            background-color: #f4f4f4; color: #333;
        }
    </style>
</head>
<body>
    <p class="doc-nav"><a href="../../../rc/">rc project page</a> &middot; <a href="../../../">Projects home</a></p>
    <article class="markdown-body" id="readme">Loading documentation&hellip;</article>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" crossorigin="anonymous"></script>
    <script>
        fetch('simplified_readme.md', { cache: 'no-cache' })
            .then(function (response) {
                if (!response.ok) throw new Error('simplified_readme.md not found');
                return response.text();
            })
            .then(function (markdown) {
                document.getElementById('readme').innerHTML = marked.parse(markdown);
            })
            .catch(function (error) {
                document.getElementById('readme').textContent = 'Could not load simplified_readme.md: ' + error.message;
            });
    </script>
</body>
</html>
